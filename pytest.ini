[pytest]
# Look for tests only under tests/.
testpaths = tests

# Put the project root on the import path so tests can `import src...` and
# `import run_experiment1_mapping` when run from anywhere.
pythonpath = .

# Custom markers. Registering them here silences "unknown marker" warnings.
markers =
    slow: tests that load the full ViT-B/16 model (downloads weights on first run). Deselect with -m "not slow".
